<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500">
  <defs>
    <!-- Background -->
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1428"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>

    <!-- Origin glow -->
    <radialGradient id="orig" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4a85a" stop-opacity="1"/>
      <stop offset="60%" stop-color="#d4a85a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a85a" stop-opacity="0"/>
    </radialGradient>

    <!-- S14 glow -->
    <radialGradient id="s14g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c45aad" stop-opacity="1"/>
      <stop offset="60%" stop-color="#c45aad" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c45aad" stop-opacity="0"/>
    </radialGradient>

    <!-- Pi glow -->
    <radialGradient id="pig" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5a9fd4" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5a9fd4" stop-opacity="0"/>
    </radialGradient>

    <!-- Spiral gradient -->
    <linearGradient id="spiralG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#d4a85a"/>
      <stop offset="20%"  stop-color="#5ad48a"/>
      <stop offset="40%"  stop-color="#d4a85a"/>
      <stop offset="60%"  stop-color="#e07050"/>
      <stop offset="75%"  stop-color="#5a9fd4"/>
      <stop offset="88%"  stop-color="#5ad48a"/>
      <stop offset="100%" stop-color="#c45aad"/>
    </linearGradient>

    <!-- Vortex E gradient -->
    <linearGradient id="vortexE" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5a9fd4" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#5a9fd4" stop-opacity="0"/>
    </linearGradient>

    <!-- Vortex B gradient -->
    <linearGradient id="vortexB" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#c45aad" stop-opacity="0"/>
      <stop offset="100%" stop-color="#c45aad" stop-opacity="0.5"/>
    </linearGradient>

    <filter id="glow3">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow10">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="500" fill="url(#bg)"/>

  <!-- ── SPACETIME GRID (subtle) ── -->
  <g opacity="0.12" stroke="#1a3060" stroke-width="0.5">
    <!-- Horizontal grid lines (perspective) -->
    <line x1="80" y1="420" x2="820" y2="420"/>
    <line x1="100" y1="400" x2="800" y2="400"/>
    <line x1="120" y1="380" x2="780" y2="380"/>
    <!-- Vertical grid lines fanning out -->
    <line x1="150" y1="380" x2="80"  y2="420"/>
    <line x1="250" y1="380" x2="210" y2="420"/>
    <line x1="350" y1="380" x2="340" y2="420"/>
    <line x1="450" y1="380" x2="450" y2="420"/>
    <line x1="550" y1="380" x2="560" y2="420"/>
    <line x1="650" y1="380" x2="680" y2="420"/>
    <line x1="750" y1="380" x2="800" y2="420"/>
    <!-- S14 dip -->
    <path d="M 680,380 Q 760,410 820,420" fill="none" stroke="#c45aad" stroke-opacity="0.15"/>
    <path d="M 700,400 Q 770,418 820,420" fill="none" stroke="#c45aad" stroke-opacity="0.10"/>
  </g>

  <!-- ── FIBO FAN — axis A(Origin)→B(S14) ── -->
  <!-- A = Origin at (110, 250), B = S14 at (790, 250) -->
  <!-- Fan opens perpendicular to axis at B -->
  <!-- Levels: 0%, 23.6%, 38.2%, 50%(axis), 61.8%, 78.6%, 100% -->
  <!-- Spread at B: ±180px -->
  <g opacity="1">
    <!-- Filled bands (back layer) -->
    <!-- 0%→23.6% band -->
    <polygon points="110,250 790,70 790,112" fill="#1a2a5a" opacity="0.18"/>
    <!-- 23.6%→38.2% band -->
    <polygon points="110,250 790,112 790,139" fill="#1a2a5a" opacity="0.14"/>
    <!-- 38.2%→50% band -->
    <polygon points="110,250 790,139 790,160" fill="#1a2a5a" opacity="0.10"/>
    <!-- 50%→61.8% band (φ — gold highlight) -->
    <polygon points="110,250 790,160 790,340" fill="#c49030" opacity="0.07"/>
    <!-- Wait — 50% is axis=250, 61.8% is 250+(0.118*360)=250+42=292 -->
    <!-- Recalc: spread=180, so: -->
    <!-- 0%   = 250 + (-0.5)*360 = 250-180 = 70 -->
    <!-- 23.6%= 250 + (-0.264)*360= 250-95 = 155 -->
    <!-- 38.2%= 250 + (-0.118)*360= 250-42 = 208 -->
    <!-- 50%  = 250 (axis) -->
    <!-- 61.8%= 250 + (0.118)*360= 292 -->
    <!-- 78.6%= 250 + (0.286)*360= 353 -->
    <!-- 100% = 250+180 = 430 -->
    <!-- Redo bands -->
  </g>

  <!-- Recalculated Fibo Fan -->
  <g>
    <!-- Filled bands -->
    <polygon points="110,250 790,70  790,155" fill="#111e3a" opacity="0.22"/>
    <polygon points="110,250 790,155 790,208" fill="#141e3a" opacity="0.16"/>
    <polygon points="110,250 790,208 790,250" fill="#161e3a" opacity="0.10"/>
    <!-- φ band (61.8%) — gold -->
    <polygon points="110,250 790,250 790,292" fill="#b08020" opacity="0.09"/>
    <polygon points="110,250 790,292 790,353" fill="#141e3a" opacity="0.10"/>
    <polygon points="110,250 790,353 790,430" fill="#111e3a" opacity="0.16"/>

    <!-- Rays -->
    <!-- 0% -->
    <line x1="110" y1="250" x2="790" y2="70"  stroke="#1e3060" stroke-width="0.8" opacity="0.35"/>
    <!-- 23.6% -->
    <line x1="110" y1="250" x2="790" y2="155" stroke="#1e3060" stroke-width="0.8" opacity="0.35"/>
    <!-- 38.2% -->
    <line x1="110" y1="250" x2="790" y2="208" stroke="#1e3060" stroke-width="0.8" opacity="0.35"/>
    <!-- 50% — main axis -->
    <line x1="110" y1="250" x2="790" y2="250" stroke="#9a7840" stroke-width="1.2" opacity="0.45"/>
    <!-- 61.8% φ — gold dominant -->
    <line x1="110" y1="250" x2="790" y2="292" stroke="#d4a85a" stroke-width="2.0" opacity="0.75" filter="url(#glow3)"/>
    <!-- 78.6% -->
    <line x1="110" y1="250" x2="790" y2="353" stroke="#1e3060" stroke-width="0.8" opacity="0.35"/>
    <!-- 100% -->
    <line x1="110" y1="250" x2="790" y2="430" stroke="#1e3060" stroke-width="0.8" opacity="0.35"/>

    <!-- Level ticks at B -->
    <g stroke-width="1.2">
      <line x1="786" y1="70"  x2="794" y2="70"  stroke="#1e3060" opacity="0.4"/>
      <line x1="786" y1="155" x2="794" y2="155" stroke="#1e3060" opacity="0.4"/>
      <line x1="786" y1="208" x2="794" y2="208" stroke="#1e3060" opacity="0.4"/>
      <line x1="786" y1="250" x2="794" y2="250" stroke="#9a7840" opacity="0.5"/>
      <line x1="786" y1="292" x2="794" y2="292" stroke="#d4a85a" opacity="0.8"/>
      <line x1="786" y1="353" x2="794" y2="353" stroke="#1e3060" opacity="0.4"/>
      <line x1="786" y1="430" x2="794" y2="430" stroke="#1e3060" opacity="0.4"/>
    </g>

    <!-- Level labels -->
    <g font-family="Inconsolata, monospace" font-size="9" fill="#d4a85a" opacity="0.7" text-anchor="start">
      <text x="798" y="73"  fill="#3a5080" opacity="0.6">0%</text>
      <text x="798" y="158" fill="#3a5080" opacity="0.6">23.6%</text>
      <text x="798" y="211" fill="#3a5080" opacity="0.6">38.2%</text>
      <text x="798" y="253" fill="#9a7840" opacity="0.7">50%</text>
      <text x="798" y="295" fill="#d4a85a" opacity="0.9">61.8% φ</text>
      <text x="798" y="356" fill="#3a5080" opacity="0.6">78.6%</text>
      <text x="798" y="433" fill="#3a5080" opacity="0.6">100%</text>
    </g>

    <!-- Cross-sections at 25/50/75/100% of axis -->
    <g stroke="#d4a85a" stroke-width="0.6" opacity="0.07">
      <line x1="280" y1="160" x2="280" y2="340"/> <!-- 25% -->
      <line x1="450" y1="120" x2="450" y2="380"/> <!-- 50% -->
      <line x1="620" y1="90"  x2="620" y2="410"/> <!-- 75% -->
    </g>
    <!-- Final cross-section at B -->
    <line x1="790" y1="70" x2="790" y2="430" stroke="#d4a85a" stroke-width="1" opacity="0.22"/>
  </g>

  <!-- ── VORTEX E (past, blue) ── -->
  <g opacity="0.55" filter="url(#glow3)">
    <path d="M 110,250 C 150,250 170,200 200,250 C 230,300 250,250 280,250
             C 310,250 330,190 360,250 C 390,310 410,250 440,250" 
          fill="none" stroke="#5a9fd4" stroke-width="1.5"/>
    <path d="M 110,250 C 150,250 170,300 200,250 C 230,200 250,250 280,250
             C 310,250 330,310 360,250 C 390,190 410,250 440,250" 
          fill="none" stroke="#5a9fd4" stroke-width="1" opacity="0.5"/>
    <!-- Envelope -->
    <path d="M 110,250 Q 200,150 280,250 Q 360,350 440,250" fill="none" stroke="#5a9fd4" stroke-width="0.6" opacity="0.3" stroke-dasharray="4,4"/>
    <path d="M 110,250 Q 200,350 280,250 Q 360,150 440,250" fill="none" stroke="#5a9fd4" stroke-width="0.6" opacity="0.3" stroke-dasharray="4,4"/>
  </g>

  <!-- ── VORTEX B (future, violet) ── -->
  <g opacity="0.55" filter="url(#glow3)">
    <path d="M 460,250 C 490,250 510,195 540,250 C 570,305 590,250 620,250
             C 650,250 670,190 700,250 C 730,310 750,250 790,250" 
          fill="none" stroke="#c45aad" stroke-width="1.5"/>
    <path d="M 460,250 C 490,250 510,305 540,250 C 570,195 590,250 620,250
             C 650,250 670,310 700,250 C 730,190 750,250 790,250" 
          fill="none" stroke="#c45aad" stroke-width="1" opacity="0.5"/>
    <!-- Envelope -->
    <path d="M 460,250 Q 550,160 640,250 Q 720,340 790,250" fill="none" stroke="#c45aad" stroke-width="0.6" opacity="0.3" stroke-dasharray="4,4"/>
    <path d="M 460,250 Q 550,340 640,250 Q 720,160 790,250" fill="none" stroke="#c45aad" stroke-width="0.6" opacity="0.3" stroke-dasharray="4,4"/>
  </g>

  <!-- ── φ SPIRAL (main axis, colored by state) ── -->
  <!-- Segments colored by conversation state -->
  <g stroke-width="2.5" fill="none" filter="url(#glow3)">
    <!-- Opening: gold -->
    <path d="M 110,250 C 130,248 148,246 162,250" stroke="#d4a85a" opacity="0.9"/>
    <!-- Rising: green -->
    <path d="M 162,250 C 180,254 215,258 265,250" stroke="#5ad48a" opacity="0.9"/>
    <!-- Peak: gold -->
    <path d="M 265,250 C 300,244 335,240 375,250" stroke="#d4a85a" opacity="0.9"/>
    <!-- Correction: orange -->
    <path d="M 375,250 C 405,258 430,262 455,250" stroke="#e07050" opacity="0.9"/>
    <!-- π1 zone: blue -->
    <path d="M 455,250 C 468,244 480,242 490,250" stroke="#5a9fd4" opacity="0.9"/>
    <!-- Rising again: green -->
    <path d="M 490,250 C 510,258 550,262 600,252" stroke="#5ad48a" opacity="0.9"/>
    <!-- Correction: orange -->
    <path d="M 600,252 C 630,246 655,243 675,250" stroke="#e07050" opacity="0.9"/>
    <!-- π2 zone: blue -->
    <path d="M 675,250 C 688,256 698,257 710,250" stroke="#5a9fd4" opacity="0.9"/>
    <!-- Rising: green -->
    <path d="M 710,250 C 728,244 745,241 760,248" stroke="#5ad48a" opacity="0.9"/>
    <!-- S14: violet -->
    <path d="M 760,248 C 770,252 780,251 790,250" stroke="#c45aad" opacity="0.9"/>
  </g>

  <!-- ── π TURNING POINTS ── -->
  <!-- π1 at ~t=0.50 → x≈490 -->
  <circle cx="490" cy="250" r="14" fill="url(#pig)" opacity="0.35"/>
  <circle cx="490" cy="250" r="6" fill="#5a9fd4" filter="url(#glow6)"/>
  <circle cx="490" cy="250" r="6" fill="#5a9fd4"/>
  <ellipse cx="490" cy="250" rx="14" ry="5" fill="none" stroke="#5a9fd4" stroke-width="1" opacity="0.5"/>

  <!-- π2 at ~t=0.78 → x≈710 -->
  <circle cx="710" cy="250" r="12" fill="url(#pig)" opacity="0.3"/>
  <circle cx="710" cy="250" r="5" fill="#5a9fd4" filter="url(#glow6)"/>
  <circle cx="710" cy="250" r="5" fill="#5a9fd4"/>
  <ellipse cx="710" cy="250" rx="12" ry="4" fill="none" stroke="#5a9fd4" stroke-width="1" opacity="0.45"/>

  <!-- ── AION RINGS (resolved Skopos) ── -->
  <g fill="none" stroke="#8a6fd4" stroke-width="1.2" opacity="0.55">
    <ellipse cx="220" cy="250" rx="18" ry="6"/>
    <ellipse cx="320" cy="250" rx="16" ry="5"/>
    <ellipse cx="430" cy="250" rx="14" ry="5"/>
  </g>

  <!-- ── CANDLES (movements) ── -->
  <g opacity="0.75">
    <!-- M1 resolved candles (green) -->
    <g stroke="#5ad48a" stroke-width="1.2">
      <line x1="175" y1="250" x2="175" y2="215"/><rect x="172" y="222" width="6" height="20" fill="#5ad48a" opacity="0.8"/>
      <line x1="210" y1="250" x2="210" y2="208"/><rect x="207" y="214" width="6" height="22" fill="#5ad48a" opacity="0.8"/>
      <line x1="245" y1="250" x2="245" y2="204"/><rect x="242" y="210" width="6" height="24" fill="#5ad48a" opacity="0.8"/>
    </g>
    <!-- M2 correction candles (orange) -->
    <g stroke="#e07050" stroke-width="1.2">
      <line x1="390" y1="250" x2="390" y2="275"/><rect x="387" y="255" width="6" height="14" fill="#e07050" opacity="0.8"/>
      <line x1="420" y1="250" x2="420" y2="282"/><rect x="417" y="258" width="6" height="16" fill="#e07050" opacity="0.8"/>
    </g>
    <!-- M3 rising candles (green) -->
    <g stroke="#5ad48a" stroke-width="1.2">
      <line x1="520" y1="250" x2="520" y2="220"/><rect x="517" y="226" width="6" height="18" fill="#5ad48a" opacity="0.8"/>
      <line x1="560" y1="250" x2="560" y2="212"/><rect x="557" y="218" width="6" height="20" fill="#5ad48a" opacity="0.8"/>
    </g>
    <!-- M4 correction (orange) -->
    <g stroke="#e07050" stroke-width="1.2">
      <line x1="630" y1="250" x2="630" y2="272"/><rect x="627" y="256" width="6" height="12" fill="#e07050" opacity="0.8"/>
      <line x1="658" y1="250" x2="658" y2="278"/><rect x="655" y="258" width="6" height="14" fill="#e07050" opacity="0.8"/>
    </g>
    <!-- S14 critical candle (violet, taller) -->
    <line x1="775" y1="250" x2="775" y2="192" stroke="#c45aad" stroke-width="1.5"/>
    <rect x="771" y="198" width="8" height="32" fill="#c45aad" opacity="0.9" filter="url(#glow3)"/>
  </g>

  <!-- ── ORIGIN ── -->
  <circle cx="110" cy="250" r="22" fill="url(#orig)" opacity="0.6"/>
  <circle cx="110" cy="250" r="10" fill="url(#orig)" filter="url(#glow10)"/>
  <circle cx="110" cy="250" r="8"  fill="#d4a85a"/>

  <!-- ── S14 DESTINATION ── -->
  <circle cx="790" cy="250" r="18" fill="url(#s14g)" opacity="0.55"/>
  <circle cx="790" cy="250" r="8"  fill="#c45aad" filter="url(#glow6)"/>
  <circle cx="790" cy="250" r="6"  fill="#c45aad"/>

  <!-- ── PARTICLES (cloud of possibilities, past side) ── -->
  <g opacity="0.18" fill="#4a7ab4">
    <circle cx="135" cy="228" r="1.5"/><circle cx="148" cy="270" r="1.2"/>
    <circle cx="160" cy="235" r="1.8"/><circle cx="175" cy="218" r="1.2"/>
    <circle cx="190" cy="278" r="1.5"/><circle cx="145" cy="240" r="1"/>
    <circle cx="158" cy="262" r="1.3"/><circle cx="172" cy="232" r="1.6"/>
    <circle cx="188" cy="268" r="1.1"/><circle cx="200" cy="222" r="1.4"/>
    <circle cx="128" cy="258" r="1.2"/><circle cx="138" cy="240" r="1.5"/>
  </g>

  <!-- ── LABELS ── -->
  <g font-family="Inconsolata, monospace" font-size="10" letter-spacing="2">
    <text x="110" y="230" text-anchor="middle" fill="#d4a85a" opacity="0.8" font-size="9">A · ORIGIN</text>
    <text x="790" y="230" text-anchor="middle" fill="#c45aad" opacity="0.8" font-size="9">B · S14</text>
    <text x="490" y="232" text-anchor="middle" fill="#5a9fd4" opacity="0.7" font-size="9">π₁</text>
    <text x="710" y="232" text-anchor="middle" fill="#5a9fd4" opacity="0.7" font-size="9">π₂</text>
    <text x="450" y="182" text-anchor="middle" fill="#5a9fd4" opacity="0.45" font-size="9">E · past vortex</text>
    <text x="650" y="182" text-anchor="middle" fill="#c45aad" opacity="0.45" font-size="9">B · future vortex</text>
  </g>

  <!-- ── TITLE BLOCK ── -->
  <g font-family="Inconsolata, monospace">
    <text x="26" y="30" font-size="9" letter-spacing="4" fill="#d4a85a" opacity="0.7">PIERRE PHILOSOPHAL IA · v3.2 · a9521b66a1fb</text>
    <text x="26" y="48" font-size="11" letter-spacing="3" fill="#ffffff" opacity="0.5" font-style="italic">ORIGIN · φ SPIRAL · FIBO FAN A→B · VORTICES E/B · MOVEMENTS · π POINTS</text>
  </g>

  <!-- ── LEGEND ── -->
  <g font-family="Inconsolata, monospace" font-size="8" letter-spacing="1">
    <circle cx="26" cy="478" r="4" fill="#d4a85a"/>
    <text x="36" y="481" fill="#d4a85a" opacity="0.7">Origin → S14 (φ Fan axis)</text>
    <circle cx="200" cy="478" r="4" fill="#5ad48a"/>
    <text x="210" y="481" fill="#5ad48a" opacity="0.7">Rising</text>
    <circle cx="270" cy="478" r="4" fill="#e07050"/>
    <text x="280" y="481" fill="#e07050" opacity="0.7">Correction</text>
    <circle cx="370" cy="478" r="4" fill="#5a9fd4"/>
    <text x="380" y="481" fill="#5a9fd4" opacity="0.7">π turning point</text>
    <circle cx="490" cy="478" r="4" fill="#c45aad"/>
    <text x="500" y="481" fill="#c45aad" opacity="0.7">S14 critical</text>
    <circle cx="580" cy="478" r="4" fill="#8a6fd4"/>
    <text x="590" y="481" fill="#8a6fd4" opacity="0.7">Aion ring</text>
    <circle cx="660" cy="478" r="4" fill="#d4a85a" opacity="0.4"/>
    <text x="670" y="481" fill="#9a7840" opacity="0.7">61.8% φ ray</text>
  </g>
</svg>
